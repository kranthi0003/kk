version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group all minor + patch updates into a single PR so we get fewer noise PRs.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Never auto-open a PR for a major version bump. Major bumps (Vite 5 -> 8,
    # react 18 -> 19, three 0.x -> 1.x etc.) regularly break our build or
    # cause runtime crashes due to peer-dep mismatches, so we only consider
    # them manually.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
